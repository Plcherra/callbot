name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10  # Give it more time for build + npm

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}          # e.g. 178.156.245.100
          username: ${{ secrets.SSH_USER }}      # adam
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22                               # default, but explicit
          timeout: 30s                           # connection timeout
          script_stop: true                      # stop on first error
          debug: true                            # more verbose logs

          script: |
            echo "=== Starting deployment ==="
            echo "Current directory: $(pwd)"
            
            cd ${{ secrets.APP_PATH }} || { echo "ERROR: Directory ${{ secrets.APP_PATH }} not found"; exit 1; }
            echo "In app directory: $(pwd)"
            
            git fetch --all
            git reset --hard origin/main
            git pull origin main || { echo "Git pull failed"; exit 1; }
            
            echo "Latest commit: $(git rev-parse HEAD)"
            
            npm ci || { echo "npm ci failed"; exit 1; }
            
            npm run build || { echo "Next.js build failed"; exit 1; }
            
            pm2 reload callbot --update-env || { echo "PM2 reload failed"; exit 1; }
            
            pm2 save || echo "pm2 save non-critical"
            
            echo "=== Deployment finished successfully ==="