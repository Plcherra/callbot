name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install SSH key
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add known hosts
        run: |
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to VPS
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "
            echo '=== Connected to VPS ==='
            cd ${{ secrets.APP_PATH }} || { echo 'Directory not found'; exit 1; }
            pwd
            git fetch --all
            git reset --hard origin/main
            git pull origin main || { echo 'Git pull failed'; exit 1; }
            echo 'Latest commit: \$(git rev-parse HEAD)'
            # Skip nginx sync and infra validation until passwordless sudo is set up.
            # Run on VPS: sudo bash deploy/scripts/setup-passwordless-sudo.sh
            # Then remove the two lines below.
            export SKIP_NGINX_SYNC=1
            export SKIP_VALIDATE_INFRA=1
            ./deploy/scripts/deploy.sh || { echo 'Deploy failed'; exit 1; }
            echo '=== Deployment completed ==='
          "