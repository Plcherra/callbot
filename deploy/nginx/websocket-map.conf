# WebSocket upgrade map - include this in nginx.conf http block.
# Add at top of http { } in /etc/nginx/nginx.conf:
#   include /etc/nginx/conf.d/websocket-map.conf;
#
# Then in location blocks use: proxy_set_header Connection $connection_upgrade;

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}
