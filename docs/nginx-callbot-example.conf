# Example nginx config for echodesk.us (bare-metal / direct DNS ONLY)
# NOT for Cloudflare Tunnel or Cloudflare proxy setups.
#
# This pattern is only safe when:
# - Clients connect directly to nginx on ports 80/443 (no tunnel/proxy in front)
# - You want nginx itself to enforce HTTP→HTTPS.
# If Cloudflare Tunnel sends traffic to http://127.0.0.1:80, do NOT use the
# port 80 redirect below; instead, follow deploy/nginx/callbot.conf.template.

server {
    listen 80;
    listen [::]:80;
    server_name echodesk.us www.echodesk.us;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name echodesk.us www.echodesk.us;

    # SSL certs (adjust paths)
    ssl_certificate /etc/letsencrypt/live/echodesk.us/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/echodesk.us/privkey.pem;

    # --- ADD THESE FIRST (before location /) ---
    location /api/telnyx/voice {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/voice/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_connect_timeout 60s;
    }
    # --- END voice proxy ---

    # Landing / app server (replace with your static root or upstream app)
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
