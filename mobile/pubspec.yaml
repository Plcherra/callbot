name: echodesk_mobile
description: Echodesk AI receptionist mobile app.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  supabase_flutter: ^2.8.0
  go_router: ^14.2.0
  flutter_secure_storage: ^9.2.2
  http: ^1.2.0
  url_launcher: ^6.2.5
  webview_flutter: ^4.9.0
  app_links: ^6.3.2

dev_dependencies:
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.3
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#5E35B1"
  remove_alpha_ios: true

flutter_native_splash:
  color: "#5E35B1"
  image: "assets/icon/app_icon.png"
